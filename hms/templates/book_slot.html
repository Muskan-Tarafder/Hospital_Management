{% extends "base.html" %}

{% block content %}

<h2>My Appointments</h2>

<table border="1">

<tr>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
</tr>

{% for booking in bookings %}

<tr>

<td>{{ booking.slot.doctor }}</td>
<td>{{ booking.slot.date }}</td>
<td>{{ booking.slot.start_time }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
