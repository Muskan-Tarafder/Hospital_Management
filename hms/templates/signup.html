{% extends "base.html" %}

{% block content %}

<h2>Signup</h2>

<form method="POST">

{% csrf_token %}
<label>Username</label>
<input type="text" name="username" required>

<br><br>

<label>Password</label>
<input type="password" name="password" required>

<br><br>


{{ form.as_p }}

<button type="submit">Register</button>

</form>

{% endblock %}
